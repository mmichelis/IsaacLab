<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 580" width="800" height="580">
  <defs>
    <style>
      .lbl  { font-family: "Segoe UI", Arial, sans-serif; font-weight: 700; }
      .body { font-family: "Segoe UI", Arial, sans-serif; font-weight: 400; }
    </style>
  </defs>

  <!-- Background -->
  <rect width="800" height="580" fill="#1e1e2e"/>

  <!-- ══════════════════════════════════════════════════════
       Layer 1 (top): Learning Libraries
       ══════════════════════════════════════════════════════ -->
  <rect x="16" y="12" width="768" height="60" rx="7" fill="#0d2014" stroke="#4caf50" stroke-width="1.5"/>
  <text x="400" y="34"  text-anchor="middle" class="lbl"  font-size="13" fill="#a5d6a7">Learning Libraries</text>
  <text x="400" y="54"  text-anchor="middle" class="body" font-size="11.5" fill="#81c784">RSL-RL &#183; skrl &#183; Stable Baselines 3 &#183; RL Games</text>

  <!-- ══════════════════════════════════════════════════════
       Layer 2: Isaac Lab Extensions
       ══════════════════════════════════════════════════════ -->
  <rect x="16" y="84" width="768" height="82" rx="7" fill="#1a0a1f" stroke="#ba68c8" stroke-width="1.5"/>
  <text x="400" y="105" text-anchor="middle" class="lbl"  font-size="13" fill="#e1bee7">Isaac Lab Extensions</text>

  <text x="88"  y="126" text-anchor="middle" class="lbl"  font-size="10.5" fill="#ce93d8">isaaclab_tasks</text>
  <text x="88"  y="141" text-anchor="middle" class="body" font-size="9.5"  fill="#9c4dcc">pre-built environments</text>

  <text x="230" y="126" text-anchor="middle" class="lbl"  font-size="10.5" fill="#ce93d8">isaaclab_assets</text>
  <text x="230" y="141" text-anchor="middle" class="body" font-size="9.5"  fill="#9c4dcc">robot &amp; sensor configs</text>

  <text x="370" y="126" text-anchor="middle" class="lbl"  font-size="10.5" fill="#ce93d8">isaaclab_rl</text>
  <text x="370" y="141" text-anchor="middle" class="body" font-size="9.5"  fill="#9c4dcc">RL library wrappers</text>

  <text x="510" y="126" text-anchor="middle" class="lbl"  font-size="10.5" fill="#ce93d8">isaaclab_mimic</text>
  <text x="510" y="141" text-anchor="middle" class="body" font-size="9.5"  fill="#9c4dcc">imitation learning</text>

  <text x="650" y="126" text-anchor="middle" class="lbl"  font-size="10.5" fill="#ce93d8">isaaclab_teleop</text>
  <text x="650" y="141" text-anchor="middle" class="body" font-size="9.5"  fill="#9c4dcc">teleoperation &amp; XR</text>

  <!-- ══════════════════════════════════════════════════════
       Layer 3: Isaac Lab Core
       ══════════════════════════════════════════════════════ -->
  <rect x="16" y="178" width="768" height="98" rx="7" fill="#2d4800" stroke="#76b900" stroke-width="1.5"/>
  <text x="400" y="200" text-anchor="middle" class="lbl"  font-size="14"  fill="#ffffff">Isaac Lab Core (isaaclab)</text>
  <text x="400" y="221" text-anchor="middle" class="body" font-size="11"  fill="#ccff90">sim &#183; scene &#183; assets &#183; sensors &#183; envs &#183; managers &#183; actuators</text>
  <text x="400" y="239" text-anchor="middle" class="body" font-size="11"  fill="#ccff90">controllers &#183; terrains &#183; devices &#183; mdp &#183; utils &#183; markers &#183; renderers</text>
  <text x="400" y="258" text-anchor="middle" class="body" font-size="10.5" fill="#b2ff59">ManagerBasedRLEnv &#183; DirectRLEnv &#183; DirectMARLEnv &#183; InteractiveScene</text>
  <text x="400" y="272" text-anchor="middle" class="body" font-size="9.5"  fill="#76b900">factory pattern: uniform API dispatches to the active physics backend at runtime</text>

  <!-- ══════════════════════════════════════════════════════
       Layer 4: Backend packages  (two columns)
       ══════════════════════════════════════════════════════ -->

  <!-- PhysX and Omniverse packages (left) -->
  <rect x="16"  y="288" width="376" height="100" rx="7" fill="#1f1500" stroke="#ffa726" stroke-width="1.5"/>
  <text x="204" y="310" text-anchor="middle" class="lbl"  font-size="12" fill="#ffcc80">isaaclab_physx &#183; isaaclab_ovphysx &#183; isaaclab_ov</text>
  <text x="204" y="329" text-anchor="middle" class="body" font-size="10.5" fill="#ffa726">Articulation &#183; Rigid Body &#183; Rigid Object Collection &#183; Deformable</text>
  <text x="204" y="347" text-anchor="middle" class="body" font-size="10.5" fill="#ffa726">Fabric Views &#183; Camera &#183; USD spawners</text>
  <text x="204" y="365" text-anchor="middle" class="body" font-size="10.5" fill="#ffa726">Isaac RTX Renderer &#183; OvRTX Renderer</text>

  <!-- Newton backend package (right) -->
  <rect x="408" y="288" width="376" height="100" rx="7" fill="#001832" stroke="#42a5f5" stroke-width="1.5"/>
  <text x="596" y="310" text-anchor="middle" class="lbl"  font-size="12" fill="#90caf9">isaaclab_newton</text>
  <text x="596" y="329" text-anchor="middle" class="body" font-size="10.5" fill="#64b5f6">Articulation &#183; Rigid Body &#183; Rigid Object Collection</text>
  <text x="596" y="347" text-anchor="middle" class="body" font-size="10.5" fill="#64b5f6">Camera &#183; USD spawners &#183; Warp Renderer</text>
  <text x="596" y="365" text-anchor="middle" class="body" font-size="10.5" fill="#42a5f5">MJWarp Solver &#183; VBD Solver</text>

  <!-- ══════════════════════════════════════════════════════
       Layer 5: External simulation dependencies  (two columns)
       ══════════════════════════════════════════════════════ -->

  <!-- Isaac Sim (optional) -->
  <rect x="16"  y="400" width="376" height="82" rx="7" fill="#1a0a00" stroke="#e64a19" stroke-width="1.5" stroke-dasharray="6 3"/>
  <text x="204" y="420" text-anchor="middle" class="lbl"  font-size="11.5" fill="#ff8a65">Isaac Sim  (optional)</text>
  <text x="204" y="438" text-anchor="middle" class="body" font-size="10.5" fill="#ff7043">PhysX &#183; RTX Rendering &#183; USD / Omniverse</text>
  <text x="204" y="456" text-anchor="middle" class="body" font-size="10.5" fill="#ff7043">ROS / ROS 2 &#183; URDF &amp; MJCF importers</text>
  <text x="204" y="472" text-anchor="middle" class="body" font-size="9.5"  fill="#e64a19">required for Isaac Sim features</text>

  <!-- Newton / Warp (kit-less) -->
  <rect x="408" y="400" width="376" height="82" rx="7" fill="#001020" stroke="#29b6f6" stroke-width="1.5"/>
  <text x="596" y="420" text-anchor="middle" class="lbl"  font-size="11.5" fill="#81d4fa">Newton Physics + Warp</text>
  <text x="596" y="438" text-anchor="middle" class="body" font-size="10.5" fill="#4fc3f7">GPU-parallel simulation &#183; Warp kernels</text>
  <text x="596" y="456" text-anchor="middle" class="body" font-size="10.5" fill="#4fc3f7">MJWarp (MuJoCo-Warp) solver</text>
  <text x="596" y="472" text-anchor="middle" class="body" font-size="9.5"  fill="#29b6f6">kit-less &#183; no Isaac Sim required</text>

  <!-- ══════════════════════════════════════════════════════
       Layer 6 (bottom): Universal foundation
       ══════════════════════════════════════════════════════ -->
  <rect x="16" y="494" width="768" height="52" rx="7" fill="#090c10" stroke="#455a64" stroke-width="1.5"/>
  <text x="400" y="516" text-anchor="middle" class="lbl"  font-size="13" fill="#cfd8dc">NVIDIA GPU Platform</text>
  <text x="400" y="535" text-anchor="middle" class="body" font-size="11" fill="#78909c">CUDA &#183; Warp  (required by all backends)</text>
</svg>
